<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Early generative AI workflow prototypes</title>
  <desc id="desc">A dark systems diagram showing GPT-3.5 connected to Python, Playwright, OAuth email APIs, local state, and PostgreSQL workflow records in 2023.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#171512"/>
      <stop offset="0.48" stop-color="#050504"/>
      <stop offset="1" stop-color="#1f100b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#ff2b1f"/>
      <stop offset="1" stop-color="#d6aa58"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0.35 0 0 0.18 0 0 0.2 0 0.06 0 0 0 0.58 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g stroke="#f4efe6" stroke-opacity="0.06">
    <path d="M0 100h1200M0 200h1200M0 300h1200M0 400h1200M0 500h1200M0 600h1200M0 700h1200"/>
    <path d="M120 0v800M240 0v800M360 0v800M480 0v800M600 0v800M720 0v800M840 0v800M960 0v800M1080 0v800"/>
  </g>
  <rect x="70" y="70" width="1060" height="660" fill="none" stroke="#f4efe6" stroke-opacity="0.18" stroke-width="2"/>
  <rect x="70" y="70" width="420" height="5" fill="url(#accent)"/>
  <g fill="none" stroke-width="3">
    <path d="M600 398 302 210" stroke="#f4efe6" stroke-opacity="0.25"/>
    <path d="M600 398 892 210" stroke="#f4efe6" stroke-opacity="0.25"/>
    <path d="M600 424 306 590" stroke="#f4efe6" stroke-opacity="0.25"/>
    <path d="M600 424 900 590" stroke="#f4efe6" stroke-opacity="0.25"/>
    <path d="M600 332v-98" stroke="#d6aa58" stroke-opacity="0.72"/>
    <path d="M600 468v98" stroke="#ff2b1f" stroke-opacity="0.72"/>
  </g>
  <g filter="url(#softGlow)">
    <circle cx="600" cy="400" r="128" fill="#10100e" stroke="url(#accent)" stroke-width="5"/>
    <circle cx="600" cy="400" r="82" fill="none" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="2"/>
    <text x="600" y="381" fill="#f4efe6" font-family="Instrument Sans, Arial, sans-serif" font-size="54" font-weight="850" text-anchor="middle">GPT-3.5</text>
    <text x="600" y="425" fill="#d6aa58" font-family="IBM Plex Mono, Consolas, monospace" font-size="20" font-weight="600" text-anchor="middle">WORKFLOW PROTOTYPES</text>
  </g>
  <g font-family="Instrument Sans, Arial, sans-serif">
    <g>
      <rect x="150" y="146" width="300" height="142" fill="#0d0c0a" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="2"/>
      <text x="182" y="205" fill="#f4efe6" font-size="34" font-weight="760">Python scripts</text>
      <text x="182" y="242" fill="#91887b" font-size="21">Private automation glue</text>
    </g>
    <g>
      <rect x="750" y="146" width="300" height="142" fill="#0d0c0a" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="2"/>
      <text x="782" y="205" fill="#f4efe6" font-size="34" font-weight="760">Playwright</text>
      <text x="782" y="242" fill="#91887b" font-size="21">Browser workflow control</text>
    </g>
    <g>
      <rect x="150" y="518" width="300" height="142" fill="#0d0c0a" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="2"/>
      <text x="182" y="577" fill="#f4efe6" font-size="34" font-weight="760">OAuth APIs</text>
      <text x="182" y="614" fill="#91887b" font-size="21">Email-backed verification</text>
    </g>
    <g>
      <rect x="750" y="518" width="300" height="142" fill="#0d0c0a" stroke="#f4efe6" stroke-opacity="0.22" stroke-width="2"/>
      <text x="782" y="577" fill="#f4efe6" font-size="34" font-weight="760">PostgreSQL</text>
      <text x="782" y="614" fill="#91887b" font-size="21">Workflow memory and records</text>
    </g>
    <g>
      <rect x="430" y="96" width="340" height="86" fill="#14110e" stroke="#d6aa58" stroke-opacity="0.58" stroke-width="2"/>
      <text x="600" y="149" fill="#d6aa58" font-family="IBM Plex Mono, Consolas, monospace" font-size="23" font-weight="600" text-anchor="middle">ARCHIVE: SEP-NOV 2023</text>
    </g>
    <g>
      <rect x="424" y="618" width="352" height="86" fill="#14110e" stroke="#ff2b1f" stroke-opacity="0.58" stroke-width="2"/>
      <text x="600" y="671" fill="#ff8a82" font-family="IBM Plex Mono, Consolas, monospace" font-size="23" font-weight="600" text-anchor="middle">PRIVATE CONTEXT OMITTED</text>
    </g>
  </g>
</svg>
