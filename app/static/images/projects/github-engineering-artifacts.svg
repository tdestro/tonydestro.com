<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Public engineering artifacts</title>
  <desc id="desc">A neon terminal-style composition representing public GitHub systems, embedded, data, and front-end work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#090b11"/>
      <stop offset=".52" stop-color="#101724"/>
      <stop offset="1" stop-color="#080a0f"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" x2="1">
      <stop offset="0" stop-color="#42d7d3"/>
      <stop offset=".5" stop-color="#ff4ab3"/>
      <stop offset="1" stop-color="#f4b44b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <path d="M88 116h1024l-42 528H130z" fill="#0d121c" stroke="#263243" stroke-width="3"/>
  <path d="M88 116h1024l-16 86H102z" fill="#151d2b"/>
  <circle cx="148" cy="158" r="14" fill="#ff4ab3"/>
  <circle cx="194" cy="158" r="14" fill="#f4b44b"/>
  <circle cx="240" cy="158" r="14" fill="#42d7d3"/>
  <path d="M154 282h284M154 344h186M154 406h360M154 468h246" stroke="#42d7d3" stroke-linecap="round" stroke-width="18" opacity=".9" filter="url(#glow)"/>
  <path d="M560 282h354M560 344h262M560 406h418M560 468h306" stroke="#ff4ab3" stroke-linecap="round" stroke-width="18" opacity=".86" filter="url(#glow)"/>
  <path d="M154 548h716" stroke="url(#rail)" stroke-linecap="round" stroke-width="5" filter="url(#glow)"/>
  <g fill="#eef3f8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="700">
    <text x="154" y="260">boxpacker.go</text>
    <text x="560" y="260">firmware.c</text>
    <text x="154" y="526">canvas + reports + tooling</text>
  </g>
  <g fill="#9aa8b6" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">
    <text x="154" y="626">Go / C / C++ / Swift / Shell / HTML / PHP</text>
  </g>
</svg>
