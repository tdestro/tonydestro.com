name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - "pyproject.toml"
      - "uv.lock"
      - ".dockerignore"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

env:
  PROJECT_ID: tony-destro-website-231405
  REGION: us-east1
  SERVICE: tony-destro-website
  ARTIFACT_REGISTRY_REPOSITORY: website
  IMAGE_REPOSITORY: us-east1-docker.pkg.dev/tony-destro-website-231405/website/tony-destro-website
  IMAGE: us-east1-docker.pkg.dev/tony-destro-website-231405/website/tony-destro-website:latest
  RUNTIME_SERVICE_ACCOUNT: tony-destro-website-runner@tony-destro-website-231405.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate app data
        run: |
          python -m compileall app
          python -m json.tool app/data/profile.json >/dev/null
          python -m json.tool app/data/projects.json >/dev/null
          python -m json.tool app/data/experience.json >/dev/null

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Authorize Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
          image: ${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}
          flags: >-
            --allow-unauthenticated
            --ingress=all
            --port=8080
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --cpu-throttling
            --no-cpu-boost
            --concurrency=80
            --timeout=60s
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --labels=managed-by=github-actions,cost-profile=minimal

      - name: Show service URL
        run: echo "${{ steps.deploy.outputs.url }}"
